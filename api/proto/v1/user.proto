syntax = "proto3";

package api.proto.v1;

option go_package = "github.com/yz627/edu-chain/api/proto/v1;v1";

import "google/protobuf/empty.proto";
import "common.proto";
import "organization.proto";
import "role.proto";

// ==================== 枚举定义 ====================

// 用户状态
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1; // 正常
  USER_STATUS_DISABLED = 2; // 禁用
  USER_STATUS_PENDING = 3; // 待审核
  USER_STATUS_LOCKED = 4; // 锁定
}

// ==================== 用户相关消息 ====================

// 用户基本信息
message User {
  string id = 1;
  string username = 2; // 用户名
  string email = 3; // 邮箱
  string phone = 4; // 手机号
  string real_name = 5; // 真实姓名
  UserStatus status = 6; // 用户状态
  string organization_id = 7; // 所属组织ID
  int64 created_at = 8; // 创建时间
  int64 updated_at = 9; // 更新时间
}

// 用户详情（包含角色信息）
message UserDetail {
  User user = 1;
  repeated Role roles = 2; // 用户角色列表
  Organization organization = 3; // 所属组织
}

// 用户列表项（用于列表响应）
message UserListItem {
  User user = 1;
  repeated Role roles = 2;
  Organization organization = 3;
}

// ==================== 请求消息 ====================

// 注册请求
message RegisterRequest {
  string username = 1;
  string email = 2;
  string phone = 3;
  string password = 4; // 加密后的密码
  string real_name = 5;
  string organization_id = 6;
  string role_id = 7; // 申请角色
}

// 登录请求
message LoginRequest {
  string username = 1; // 用户名/邮箱/手机号
  string password = 2;
  string captcha = 3; // 验证码（可选）
  string captcha_id = 4; // 验证码ID（可选）
}

// 刷新令牌请求
message RefreshTokenRequest {
  string refresh_token = 1;
}

// 登出请求
message LogoutRequest {
  string token = 1; // 需要撤销的令牌
}

// 获取当前用户信息请求
message GetCurrentUserRequest {}

// 获取用户请求
message GetUserRequest {
  string user_id = 1;
}

// 更新用户资料请求
message UpdateProfileRequest {
  string user_id = 1;
  string email = 2;
  string phone = 3;
  string real_name = 4;
  string avatar = 5; // 头像URL
}

// 更新密码请求
message UpdatePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

// 分页查询用户请求
message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string keyword = 3; // 关键词搜索
  string organization_id = 4;
  string role_id = 5;
  UserStatus status = 6;
}

// 删除用户请求
message DeleteUserRequest {
  string user_id = 1;
}

// ==================== 响应消息 ====================

// 注册响应
message RegisterResponse {
  string user_id = 1;
  string message = 2;
}

// 登录响应
message LoginResponse {
  string access_token = 1; // 访问令牌
  string refresh_token = 2; // 刷新令牌
  int64 expires_in = 3; // 过期时间（秒）
  UserDetail user = 4; // 用户信息
}

// 分页查询用户响应
message ListUsersResponse {
  repeated UserListItem users = 1;
  PageInfo pagination = 2;
}

// ==================== 服务定义 ====================

service UserService {
  // 用户认证
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
  rpc RefreshToken(RefreshTokenRequest) returns (LoginResponse);
  
  // 用户管理
  rpc GetCurrentUser(GetCurrentUserRequest) returns (UserDetail);
  rpc GetUser(GetUserRequest) returns (UserDetail);
  rpc UpdateProfile(UpdateProfileRequest) returns (User);
  rpc UpdatePassword(UpdatePasswordRequest) returns (google.protobuf.Empty);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  
  // 用户查询
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}
