# 服务器配置
server:
  host: 0.0.0.0
  port: 8080
  mode: debug
  read_timeout: 30    # 读取超时(秒)
  write_timeout: 30   # 写入超时(秒)

# gRPC 配置
grpc:
  host: 0.0.0.0
  port: 9090

# 数据库配置
database:
  name: mysql           # 数据库类型
  host: localhost       # 数据库地址
  port: 3306            # 数据库端口
  username: root        # 数据库用户名
  password: "123456"   # 数据库密码
  database: edu_chain   # 数据库名称
  sslmode: disable      # SSL模式
  max_open_conns: 10    # 最大连接数
  max_idle_conns: 10    # 最大空闲连接数
  max_lifetime: 30      # 连接最大生命周期 单位秒
  timeout: 30           # 连接超时时间 单位秒

# Redis配置
redis:
  host: localhost   # Redis服务地址
  port: 6379        # Redis服务端口
  password: ""      # Redis密码
  db: 0             # Redis数据库索引
  pool_size: 10    # 连接池大小

# 日志配置
logger:
  level: info            # 日志级别 (debug, info, warn, error, fatal)
  format: json           # 日志格式 (json, console)
  directory: logs        # 日志目录
  console: true          # 是否输出到控制台
  max_size: 100         # 单个日志文件最大大小(MB)
  max_age: 30           # 日志文件保留天数
  max_backups: 10       # 保留的日志文件数量
  enable_stacktrace: false  # 是否启用堆栈跟踪

# jwt 配置
jwt:
  secret: "edu-chain-secret-key-change-in-production"  # jwt密钥
  expire: 3600       # 访问令牌过期时间 单位秒(1小时)
  refresh_expire: 604800  # 刷新令牌过期时间 单位秒(7天)
  issuer: "edu-chain"     # JWT签发者

# 区块链配置
blockchain:
  enabled: true                    # 是否启用区块链
  type: "fiscobcos"               # 区块链类型: fiscobcos, ethereum, fabric
  
  fiscobcos:
    # 节点连接
    node_url: "http://127.0.0.1:8545"   # RPC节点URL
    group_id: "1"                        # 群组ID
    chain_id: 1                          # 链ID
    
    # 账户配置(私钥和私钥文件二选一)
    account_key: ""                       # 十六进制私钥
    account_key_file: ""                  # 私钥文件路径
    
    # 合约配置
    contract_address: ""                  # 部署后的合约地址
    contract_abi: ""                      # 合约ABI JSON
    contract_abi_path: ""                 # 合约ABI文件路径
    
    # 连接配置
    timeout: 30s                          # 请求超时
    max_retries: 3                        # 最大重试次数
    confirm_timeout: 60s                  # 交易确认超时
    gas_limit: 3000000                    # Gas限制
    
    # 国密配置(可选)
    # gm_enable: false
    # gm_account_key: ""
    # gm_account_key_file: ""
    # gm_account_cert: "./certs/gm-node.crt"
    # gm_ssl_ca: "./certs/gmca.crt"
    # gm_ssl_cert: "./certs/gmnode.crt"
    # gm_ssl_key: "./certs/gmnode.key"
