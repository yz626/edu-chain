# 服务器配置
server:
  host: 0.0.0.0
  port: 8080
  mode: debug

# 数据库配置
database:
  name: mysql           # 数据库类型
  host: localhost       # 数据库地址
  port: 3306            # 数据库端口
  username: root        # 数据库用户名
  password: "123456"   # 数据库密码
  database: edu_chain   # 数据库名称
  sslmode: disable      # SSL模式
  max_open_conns: 10    # 最大连接数
  max_idle_conns: 10    # 最大空闲连接数
  timeout: 30           # 连接超时时间

# Redis配置
redis:
  host: localhost   # Redis服务地址
  port: 6379        # Redis服务端口
  password: ""      # Redis密码
  db: 0             # Redis数据库索引
  pool_size: 10     # 连接池大小