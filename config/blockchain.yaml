# ================================================================
# FISCO BCOS 3.0 区块链配置文件
# ================================================================
# 说明：
#   - 本文件专门管理区块链相关配置，与主配置文件 config.yaml 分离
#   - 证书文件路径相对于项目根目录
#   - 私钥建议通过环境变量 BLOCKCHAIN_ACCOUNT_KEY 注入，避免明文存储
# ================================================================

blockchain:
  # 是否启用区块链功能（false 时跳过初始化，便于纯后端开发调试）
  enabled: true

  # ---------------------------------------------------------------
  # 节点连接配置
  # ---------------------------------------------------------------
  nodes:
    # 节点 RPC 地址列表（支持多节点，SDK 会自动负载均衡）
    # FISCO BCOS 3.0 默认 RPC 端口为 20200（RPC JSON-RPC）
    - "127.0.0.1:20200"
    # 多节点示例（生产环境推荐至少 2 个节点）
    # - "127.0.0.1:20201"
    # - "127.0.0.1:20202"

  # 群组 ID（与节点 config.genesis 中的 group_id 一致）
  group_id: "group0"

  # 链 ID（与节点 config.genesis 中的 chain_id 一致）
  chain_id: "chain0"

  # ---------------------------------------------------------------
  # TLS 证书配置（FISCO BCOS 3.0 默认开启 TLS）
  # 证书文件从节点 sdk/ 目录获取
  # ---------------------------------------------------------------
  tls:
    # 是否启用 TLS（节点 config.ini 中 enable_ssl=true）
    enabled: true
    # CA 根证书（来自 fisco3/sdk/ca.crt）
    ca_cert: "fisco3/sdk/ca.crt"
    # SDK 客户端证书（来自 fisco3/sdk/sdk.crt）
    client_cert: "fisco3/sdk/sdk.crt"
    # SDK 客户端私钥（来自 fisco3/sdk/sdk.key）
    client_key: "fisco3/sdk/sdk.key"

  # ---------------------------------------------------------------
  # 账户配置（用于签名交易的私钥账户）
  # ---------------------------------------------------------------
  account:
    # 账户私钥（十六进制，64位，不带 0x 前缀）
    # 生产环境请通过环境变量 BLOCKCHAIN_ACCOUNT_KEY 注入
    key: "MIGNAgEAMBAGByqGSM49AgEGBSuBBAAKBHYwdAIBAQQgJ5LEnCnkSS2VlqwNujAH4upjOP9vreWhL8E1fgPX0PGgBwYFK4EEAAqhRANCAASQLg46eGvCgimU0ZtCYYaL8z6OHvqbi5AMwUfF9SvZ8jUxIOgK0TdJwP1RDlq52LNzGBShB4LB4z7o6nML5jZ1"
    # 账户私钥文件路径（key 和 key_file 二选一，key 优先）
    key_file: "fisco3/accounts/account.key"
    # 账户地址（可选，不填则由 key 推导）
    address: "0xa34dbe5817874f4f78f4acf03ff59925e4413056"

  # ---------------------------------------------------------------
  # 连接参数
  # ---------------------------------------------------------------
  timeout: 30           # 请求超时（秒）
  retry_times: 3        # 失败重试次数
  retry_interval: 2     # 重试间隔（秒）

  # ---------------------------------------------------------------
  # 智能合约配置
  # ---------------------------------------------------------------
  contract:
    # CertificateRegistry 合约部署地址（部署后填入）
    address: "0xc8ead4b26b2c6ac14c9fd90d9684c9bc2cc40085"
    # 合约 ABI 文件路径（由 abigen 生成）
    abi_file: "contracts/abi/CertificateRegistry.abi"
    # 部署者名称（构造函数参数 ownerName，仅首次部署时使用）
    owner_name: "Test 1"
